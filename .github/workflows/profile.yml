name: 'update profile'
on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '36 20 * * Sat'

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master
          fetch-depth: 0
      - name: Checkout fix
        run: |
          git pull
      - name: Update feed / Qiita
        uses: sarisia/actions-readme-feed@bdde7fdb36e19b030b77cf1f7b7f09db68219f32 # v1.10.1
        with:
          url: 'https://qiita.com/tsuyoshi_cho/feed'
          file: 'README.adoc'
          format: '* ${monthshort} ${02day}: ${url}[${title}]'
          start_flag: '// qiita start'
          end_flag: '// qiita end'
      - name: Update feed / Zenn
        uses: sarisia/actions-readme-feed@bdde7fdb36e19b030b77cf1f7b7f09db68219f32 # v1.10.1
        with:
          url: 'https://zenn.dev/tsuyoshicho/feed'
          file: 'README.adoc'
          format: '* ${monthshort} ${02day}: ${url}[${title}]'
          start_flag: '// zenn start'
          end_flag: '// zenn end'
      - name: Get current time
        uses: josStorer/get-current-time@6826799222c9d913068c04cb99e67f34dbf3caae # v2.1.3
        id: current-time
      - name: Commit changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          default_author: github_actions
          message: 'Update profile page / ${{ steps.current-time.outputs.ISOTime }}'
          add: 'README.adoc'
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN }}

  metrics:
    needs: feed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master
          fetch-depth: 0
      - name: Update metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          user: ${{ github.repository_owner }}
          token: ${{ secrets.PROFILE_TOKEN }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tokyo
          plugin_achievements: no
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_habits: no
          plugin_habits_charts: no
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugins_errors_fatal: no
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_people: yes
          plugin_people_limit: 28
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_reactions: yes
          plugin_reactions_display: absolute
          plugin_reactions_ignored: github-actions[bot], dependabot[bot],profile-summary-cards[bot]
          plugin_reactions_limit: 200
          plugin_topics: yes
          plugin_topics_limit: 15
          output_action: commit
          committer_branch: ci/assets
          committer_token: ${{ secrets.PROFILE_TOKEN }}
          committer_message: 'Update metrics generated by GitHub Actions'
          plugin_topics_mode: mastered
          plugin_topics_sort: stars

  summary:
    needs: metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ci/assets
          fetch-depth: 0
      - name: Checkout fix
        run: |
          git pull
      - name: Update summary
        uses: vn7n24fzkq/github-profile-summary-cards@5055b27ac896c627043ead432f9b2fa973aa2c80 # v0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: ci/assets
          AUTO_PUSH: true
